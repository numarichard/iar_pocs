schema_version: 2
viz_type: table
id: advisor_attention
display_name: "Advisor Attention"
description: "Per-advisor signal for weekly review (POC, mock data)"
grain: service_advisor

source:
  type: csv
  path: fixtures/advisor_conversations.csv

# Period filter: windowed on `field`. The renderer uses two windows of equal
# length (current and the one immediately prior) so trend metrics can compare.
period:
  field: started_at
  default_days: 30
  options: [7, 14, 30, 90]
  trend_threshold_pp: 5

columns:
  - id: advisor_name
    display_name: "Advisor"
    type: string
    aggregation:
      type: group_key

  - id: total_conversations
    display_name: "Total Conversations"
    type: integer
    aggregation:
      type: count

  - id: negative_pct
    display_name: "Negative %"
    type: percent
    aggregation:
      type: pct_where
      where:
        column: sentiment
        equals: negative

  - id: trend
    display_name: "Trend"
    type: string
    aggregation:
      type: trend_pct_where
      where:
        column: sentiment
        equals: negative

  - id: unresolved_negatives
    display_name: "Unresolved Negatives"
    type: integer
    aggregation:
      type: count_where
      where:
        all:
          - column: sentiment
            equals: negative
          - column: resolved
            equals: false

  - id: avg_response_time
    display_name: "Avg Response Time"
    type: duration_minutes
    aggregation:
      type: avg
      column: response_time_seconds
      output_unit: minutes

  - id: top_issue
    display_name: "Top Issue"
    type: string
    aggregation:
      type: mode
      column: issue_category
      where:
        column: sentiment
        equals: negative

sort:
  - column: unresolved_negatives
    direction: desc
  - column: negative_pct
    direction: desc
